<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exercices DNB Technologie – Programmer un robot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0e1a;--bg-card:#151829;--bg-input:#1a1e35;--border:#2a2f4a;--text:#e2e8f0;--text-dim:#8892b0;--text-muted:#5a6380;--accent:#6c63ff;--accent-glow:rgba(108,99,255,.3);--green:#10b981;--green-bg:rgba(16,185,129,.12);--green-border:rgba(16,185,129,.4);--red:#ef4444;--red-bg:rgba(239,68,68,.12);--red-border:rgba(239,68,68,.4);--orange:#f59e0b;--orange-bg:rgba(245,158,11,.12);--blue:#3b82f6;--teal:#14b8a6;--pink:#ec4899;--radius:12px;--radius-sm:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.app-container{max-width:900px;margin:0 auto;padding:1rem}
.app-header{text-align:center;padding:2.5rem 1rem 2rem;position:relative}
.app-header::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:300px;height:300px;background:radial-gradient(circle,var(--accent-glow) 0%,transparent 70%);pointer-events:none;z-index:0}
.app-header *{position:relative;z-index:1}
.app-header h1{font-size:2rem;font-weight:900;background:linear-gradient(135deg,#6c63ff,#a78bfa,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.app-header .subtitle{color:var(--text-dim);font-size:.95rem;margin-top:.3rem}
.score-bar{display:flex;align-items:center;justify-content:center;gap:2rem;padding:.8rem 1.5rem;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:1.5rem;flex-wrap:wrap}
.score-item{display:flex;align-items:center;gap:.5rem;font-size:.85rem;font-weight:600}
.score-item .val{font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:700}
.score-item.correct .val{color:var(--green)}.score-item.wrong .val{color:var(--red)}.score-item.total .val{color:var(--accent)}
.progress-wrap{flex:1;min-width:150px;max-width:300px;height:8px;background:var(--bg-input);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--teal));border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1);width:0%}
.nav-tabs{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1.5rem;padding:.4rem;background:var(--bg-card);border-radius:var(--radius);border:1px solid var(--border)}
.nav-tab{flex:1;min-width:80px;padding:.6rem .5rem;background:0 0;border:none;color:var(--text-dim);font-family:'Outfit',sans-serif;font-size:.75rem;font-weight:600;cursor:pointer;border-radius:var(--radius-sm);transition:all .25s;text-align:center;position:relative}
.nav-tab:hover{color:var(--text);background:var(--bg-input)}.nav-tab.active{background:var(--accent);color:#fff;box-shadow:0 2px 12px var(--accent-glow)}
.nav-tab .tab-num{display:block;font-size:.65rem;font-weight:400;opacity:.7;margin-bottom:1px}
.nav-tab .tab-check{position:absolute;top:4px;right:6px;font-size:.6rem;color:var(--green)}
.section{display:none}.section.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.section-header{margin-bottom:1.5rem}.section-header h2{font-size:1.3rem;font-weight:800;margin-bottom:.3rem}.section-header .fiche-ref{font-size:.78rem;color:var(--text-muted)}
.exercise{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.2rem;transition:border-color .3s}
.exercise.answered-correct{border-color:var(--green-border);background:var(--green-bg)}.exercise.answered-wrong{border-color:var(--red-border);background:var(--red-bg)}
.exercise-num{font-size:.7rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:.5rem}
.exercise-question{font-size:1rem;font-weight:600;margin-bottom:1rem;line-height:1.5}
.options{display:flex;flex-direction:column;gap:.5rem}
.option-btn{display:flex;align-items:center;gap:.8rem;width:100%;padding:.8rem 1rem;background:var(--bg-input);border:2px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:500;cursor:pointer;transition:all .2s;text-align:left}
.option-btn:hover:not(.disabled){border-color:var(--accent);background:rgba(108,99,255,.08)}
.option-btn .opt-letter{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:var(--border);border-radius:6px;font-weight:700;font-size:.8rem;flex-shrink:0;transition:all .2s}
.option-btn:hover:not(.disabled) .opt-letter{background:var(--accent);color:#fff}
.option-btn.correct{border-color:var(--green);background:var(--green-bg)}.option-btn.correct .opt-letter{background:var(--green);color:#fff}
.option-btn.wrong{border-color:var(--red);background:var(--red-bg)}.option-btn.wrong .opt-letter{background:var(--red);color:#fff}
.option-btn.disabled{cursor:default;opacity:.7}.option-btn.disabled.correct{opacity:1}
.ordering-zone{display:flex;flex-direction:column;gap:.5rem}
.drag-item{display:flex;align-items:center;gap:.8rem;padding:.7rem 1rem;background:var(--bg-input);border:2px solid var(--border);border-radius:var(--radius-sm);cursor:grab;transition:all .2s;font-size:.88rem;font-weight:500;user-select:none}
.drag-item:active{cursor:grabbing}.drag-item:hover{border-color:var(--accent)}
.drag-item .drag-handle{color:var(--text-muted);font-size:1rem;flex-shrink:0}
.drag-item .drag-num{width:24px;height:24px;display:flex;align-items:center;justify-content:center;background:var(--border);border-radius:6px;font-weight:700;font-size:.75rem;flex-shrink:0}
.drag-item.correct-pos{border-color:var(--green);background:var(--green-bg)}.drag-item.correct-pos .drag-num{background:var(--green);color:#fff}
.drag-item.wrong-pos{border-color:var(--red);background:var(--red-bg)}
.fill-group{display:flex;flex-wrap:wrap;gap:.6rem;align-items:center}
.fill-input{background:var(--bg-input);border:2px solid var(--border);border-radius:var(--radius-sm);padding:.5rem .8rem;color:var(--text);font-family:'Outfit',sans-serif;font-size:.9rem;width:180px;outline:none;transition:border-color .2s}
.fill-input:focus{border-color:var(--accent)}.fill-input.correct{border-color:var(--green);background:var(--green-bg)}.fill-input.wrong{border-color:var(--red);background:var(--red-bg)}

/* ══ MATCHING — 2 COLUMNS ══ */
.match-wrapper{margin-bottom:.5rem}
.match-headers{display:grid;grid-template-columns:1fr 40px 1fr;gap:0;margin-bottom:.4rem}
.match-col-header{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);text-align:center}
.match-rows{display:flex;flex-direction:column;gap:.5rem}
.match-row{display:grid;grid-template-columns:1fr 40px 1fr;gap:0;align-items:center}
.match-row .match-center{display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:.8rem}
.match-item{padding:.65rem .9rem;background:var(--bg-input);border:2px solid var(--border);border-radius:var(--radius-sm);font-size:.85rem;font-weight:500;cursor:pointer;transition:all .2s;text-align:center}
.match-item:hover:not(.matched):not(.locked){border-color:var(--accent);background:rgba(108,99,255,.08)}
.match-item.selected{border-color:var(--orange);background:var(--orange-bg);box-shadow:0 0 12px rgba(245,158,11,.2)}
.match-item.matched{cursor:default}
.match-item.matched.pair-0{border-color:#6c63ff;background:rgba(108,99,255,.15)}.match-item.matched.pair-1{border-color:#14b8a6;background:rgba(20,184,166,.15)}.match-item.matched.pair-2{border-color:#f59e0b;background:rgba(245,158,11,.15)}.match-item.matched.pair-3{border-color:#ec4899;background:rgba(236,72,153,.15)}.match-item.matched.pair-4{border-color:#3b82f6;background:rgba(59,130,246,.15)}
.match-legend{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.6rem;min-height:1.2rem}
.match-legend-item{display:flex;align-items:center;gap:.3rem;font-size:.72rem;color:var(--text-dim);padding:.2rem .5rem;background:var(--bg-input);border-radius:4px;border:1px solid var(--border)}
.match-legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.match-undo-btn{margin-top:.5rem;padding:.3rem .8rem;background:0 0;border:1px solid var(--border);border-radius:4px;color:var(--text-dim);font-family:'Outfit',sans-serif;font-size:.75rem;cursor:pointer;transition:all .2s}
.match-undo-btn:hover{border-color:var(--orange);color:var(--orange)}

.validate-btn{display:inline-flex;align-items:center;gap:.5rem;margin-top:1rem;padding:.7rem 1.5rem;background:var(--accent);border:none;border-radius:var(--radius-sm);color:#fff;font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 2px 12px var(--accent-glow)}
.validate-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px var(--accent-glow)}.validate-btn:disabled{opacity:.4;cursor:default;transform:none}
.feedback{margin-top:.8rem;padding:.8rem 1rem;border-radius:var(--radius-sm);font-size:.85rem;font-weight:500;display:none;animation:slideUp .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.feedback.show{display:block}.feedback.correct{background:var(--green-bg);border:1px solid var(--green-border);color:var(--green)}.feedback.wrong{background:var(--red-bg);border:1px solid var(--red-border);color:var(--red)}
.reset-section{text-align:center;margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--border)}
.reset-btn{padding:.6rem 1.5rem;background:0 0;border:2px solid var(--border);border-radius:var(--radius-sm);color:var(--text-dim);font-family:'Outfit',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s}.reset-btn:hover{border-color:var(--red);color:var(--red)}
.app-footer{text-align:center;padding:2rem 1rem;color:var(--text-muted);font-size:.72rem}
@media(max-width:600px){.app-header h1{font-size:1.5rem}.score-bar{gap:1rem;padding:.6rem 1rem}.nav-tab{min-width:60px;font-size:.68rem;padding:.5rem .3rem}.match-item{font-size:.78rem;padding:.5rem .6rem}.match-row{grid-template-columns:1fr 24px 1fr}}
</style>
</head>
<body>
<div class="app-container">
<header class="app-header"><h1>Exercices interactifs</h1><p class="subtitle">Scénario 4 — Programmer un robot pour répondre à un besoin</p></header>
<div class="score-bar"><div class="score-item correct">✅ <span class="val" id="score-correct">0</span></div><div class="score-item wrong">❌ <span class="val" id="score-wrong">0</span></div><div class="progress-wrap"><div class="progress-fill" id="progress-fill"></div></div><div class="score-item total">📊 <span class="val" id="score-pct">0%</span></div></div>
<nav class="nav-tabs" id="nav-tabs"></nav>
<main id="sections-container"></main>
<footer class="app-footer">Révision DNB Technologie — Programme Cycle 4 (BO 2020) — Académie de Bordeaux<br>Sources : Fiches IP-2-2-C1, IP-2-3-C1 à C6 — Scénario 4</footer>
</div>
<script>
const PAIR_COLORS=['#6c63ff','#14b8a6','#f59e0b','#ec4899','#3b82f6'];
const SECTIONS=[{id:'algo',num:'Fiche 1',title:'Algorithme & Programme',ref:'Source : IP-2-3-C1',color:'#6c63ff',exercises:[{type:'qcm',question:"Qu'est-ce qu'un algorithme ?",options:["Un logiciel de programmation par blocs","Une suite logique d'opérations pour résoudre un problème","Un langage de programmation comme Python","Un composant électronique du robot"],correct:1,explanation:"Un algorithme est une suite finie d'opérations ou d'instructions aboutissant à la résolution d'un problème."},{type:'qcm',question:"Dans quel ordre se déroulent les 3 étapes d'élaboration d'un programme ?",options:["Langage machine → Logiciel par blocs → Langage naturel","Logiciel par blocs → Langage naturel → Langage machine","Langage naturel → Logiciel par blocs → Langage machine","Langage naturel → Langage machine → Logiciel par blocs"],correct:2,explanation:"On écrit d'abord en langage naturel, puis on construit avec un logiciel par blocs, puis le logiciel traduit en langage machine binaire."},{type:'qcm',question:"Le microprocesseur interprète quel type de langage ?",options:["Le langage Python","Le langage naturel (français)","Le langage machine binaire (0 et 1)","Le langage Scratch"],correct:2,explanation:"L'algorithme devient un langage machine binaire (0 ou 1) interprété par le microprocesseur."},{type:'fill',question:"Complète : Un algorithme peut être traduit grâce à un langage de ________ en un programme binaire.",answer:'programmation',explanation:"Un algorithme peut être traduit grâce à un langage de programmation (C, C++, Python...)."},{type:'qcm',question:"Quel logiciel permet de construire une représentation graphique de l'algorithme ?",options:["Word","Scratch ou Blockly","Excel","Paint"],correct:1,explanation:"On construit l'algorithme à l'aide d'un logiciel comme Scratch ou Blockly."}]},{id:'ecrire',num:'Fiche 2',title:'Écrire & tester un programme',ref:'Source : IP-2-2-C1',color:'#14b8a6',exercises:[{type:'ordering',question:"Remets dans l'ordre les 8 étapes de la programmation :",items:["Vérifier le cahier des charges","Rédiger un algorithme","Repérer capteurs et actionneurs","Repérer les instructions du logiciel","Assembler les instructions","Exécuter le programme","Vérifier le comportement attendu","Adapter / corriger le programme"],correctOrder:[0,1,2,3,4,5,6,7],explanation:"Les 8 étapes : cahier des charges → algorithme → capteurs/actionneurs → instructions → assemblage → exécution → vérification → correction."},{type:'qcm',question:"Que faut-il faire si le comportement du robot ne correspond pas à ce qui est attendu ?",options:["Recommencer tout depuis le début","Changer de robot","Corriger et adapter le programme","Ajouter plus de capteurs"],correct:2,explanation:"Il faut corriger et adapter le programme (étapes 7 et 8)."},{type:'qcm',question:"À quelle étape rédige-t-on l'algorithme ?",options:["Étape 1","Étape 2","Étape 5","Étape 6"],correct:1,explanation:"L'étape 2 consiste à rédiger un algorithme."},{type:'fill',question:"Complète : Pour écrire un programme, on utilise un logiciel de programmation par ________.",answer:'blocs',explanation:"Le concepteur crée des programmes à l'aide d'un logiciel de programmation par blocs."}]},{id:'sequences',num:'Fiche 3',title:'Séquences & Boucles',ref:'Source : IP-2-3-C3',color:'#8b5cf6',exercises:[{type:'qcm',question:"Quelle est la différence entre une séquence et une boucle ?",options:["Une séquence utilise des capteurs, une boucle non","Une séquence s'exécute une seule fois, une boucle répète les instructions","Une séquence est plus rapide qu'une boucle","Il n'y a pas de différence"],correct:1,explanation:"Une séquence enchaîne les ordres une seule fois, une boucle les répète."},{type:'qcm',question:'"Répéter 4 fois : avancer + tourner 90°" pour tracer un carré. C\'est :',options:["Une séquence simple","Une boucle définie","Une boucle infinie","Une instruction conditionnelle"],correct:1,explanation:"C'est une boucle définie : les instructions sont répétées un nombre précis de fois (4)."},{type:'qcm',question:'"Répéter indéfiniment : avancer" est :',options:["Une séquence","Une boucle définie","Une boucle infinie","Une condition"],correct:2,explanation:"\"Répéter indéfiniment\" est une boucle infinie."},{type:'qcm',question:"Avancer 3s, tourner à droite, avancer 2s, stop. C'est :",options:["Une boucle","Une séquence","Une condition","Un capteur"],correct:1,explanation:"Les ordres s'enchaînent une seule fois : c'est une séquence."}]},{id:'conditions',num:'Fiche 4',title:'Instructions conditionnelles',ref:'Source : IP-2-3-C3',color:'#f59e0b',exercises:[{type:'qcm',question:'Que signifie "SI distance < 10 cm ALORS arrêt SINON avancer" ?',options:["Le robot s'arrête toujours","Le robot avance toujours","Le robot s'arrête si obstacle < 10 cm, sinon il avance","Le robot tourne à gauche"],correct:2,explanation:"SI la condition est vraie (obstacle < 10 cm), le robot s'arrête. SINON, il avance."},{type:'qcm',question:'"Quand la touche espace est pressée" est un exemple de :',options:["Boucle infinie","Variable dynamique","Événement initial","Événement conditionnel"],correct:2,explanation:"C'est un événement initial (\"Quand événement\") qui lance le programme."},{type:'matching',question:"Associe chaque type d'événement à son exemple :",left:["Événement initial","Événement conditionnel","Variation de grandeur physique","Déplacement mesuré par capteur"],right:["Quand touche pressée","SI obstacle ALORS arrêt","Changement de luminosité","Mesure capteur ultrasons"],correctPairs:[[0,0],[1,1],[2,2],[3,3]],explanation:"L'événement initial lance le programme. Le conditionnel teste une condition. La grandeur physique varie (luminosité). Le déplacement est mesuré (ultrasons)."},{type:'fill',question:"Complète : ________ obstacle ALORS arrêt SINON avancer.",answer:'si',explanation:"L'instruction conditionnelle : SI [condition] ALORS [action] SINON [autre action]."},{type:'qcm',question:"Lequel est détectable par un capteur ?",options:["Le nom du robot","La variation de luminosité","La couleur du programme","Le nom du programmeur"],correct:1,explanation:"La variation d'une grandeur physique (luminosité, chaleur…) est détectable par un capteur."}]},{id:'variables',num:'Fiche 5',title:'Variables informatiques',ref:'Source : IP-2-3-C2',color:'#3b82f6',exercises:[{type:'qcm',question:"Qu'est-ce qu'une variable informatique ?",options:["Un type de capteur","Un élément qui associe un nom à une valeur stockée en mémoire","Un logiciel de programmation","Un type d'actionneur"],correct:1,explanation:"Les variables associent un nom à une valeur stockée dans la mémoire."},{type:'qcm',question:'"vitesse = 100" est une variable :',options:["Dynamique","Statique","Conditionnelle","Séquentielle"],correct:1,explanation:"Les variables statiques sont des valeurs constantes définies par le programmeur."},{type:'qcm',question:'"obstacle = distance capteur ultrasons" est :',options:["Statique","Dynamique","Constante","Initiale"],correct:1,explanation:"Les variables affectées à des capteurs sont dynamiques."},{type:'matching',question:"Associe chaque variable à son type :",left:["vitesse = 100","obstacle = capteur ultrasons","intersection = compteur +1","temps d'attente = 3 secondes"],right:["Statique (constante)","Dynamique (capteur)","Dynamique (comptage)","Statique (durée fixe)"],correctPairs:[[0,0],[1,1],[2,2],[3,3]],explanation:"vitesse et temps sont statiques (constantes). obstacle est dynamique (capteur). intersection est dynamique (comptage)."},{type:'fill',question:"Complète : Une variable ________ change de valeur en fonction du capteur.",answer:'dynamique',explanation:"Les variables dynamiques changent dans le temps avec la mesure."}]},{id:'capteurs',num:'Fiche 6',title:'Capteur, Actionneur, Interface',ref:'Source : IP-2-3-C6',color:'#10b981',exercises:[{type:'matching',question:"Associe chaque composant à son rôle :",left:["Capteur","Actionneur","Interface programmable"],right:["Détecte une grandeur physique","Réalise une action (moteur, LED…)","Traite les informations et envoie les ordres"],correctPairs:[[0,0],[1,1],[2,2]],explanation:"Le capteur détecte (entrée), l'actionneur agit (sortie), l'interface traite (programme)."},{type:'qcm',question:"Dans la chaîne d'information, quel est l'ordre correct ?",options:["Actionneur → Interface → Capteur","Interface → Capteur → Actionneur","Capteur → Interface → Actionneur","Capteur → Actionneur → Interface"],correct:2,explanation:"Capteur (acquérir) → Interface (traiter) → Actionneur (agir)."},{type:'qcm',question:"Lequel est un actionneur ?",options:["Capteur à ultrasons","Capteur de luminosité","Moteur","Capteur de température"],correct:2,explanation:"Le moteur est un actionneur : il convertit l'énergie pour agir."},{type:'qcm',question:"Le capteur à ultrasons du mBot mesure :",options:["La température","La luminosité","La distance à un obstacle","La vitesse du robot"],correct:2,explanation:"Le capteur à ultrasons mesure la distance entre le robot et un obstacle."},{type:'fill',question:"Complète la chaîne : Capteur → ________ → Actionneur",answer:'interface',explanation:"L'interface traite les informations et commande les actionneurs."}]},{id:'embarque',num:'Fiche 7',title:'Systèmes embarqués',ref:'Source : IP-2-3-C4',color:'#ef4444',exercises:[{type:'qcm',question:"Qu'est-ce qu'un système embarqué ?",options:["Un logiciel en ligne","Un système électronique autonome capable de réagir en temps réel","Un capteur de température","Un réseau informatique"],correct:1,explanation:"Un système embarqué est électronique, informatique et autonome, réagissant en temps réel."},{type:'qcm',question:"Un portail automatique avec programme prédéfini est un exemple de :",options:["IA forte","IA faible","Variable dynamique","Boucle infinie"],correct:1,explanation:"L'IA faible exécute des tâches prédéfinies à l'avance."},{type:'qcm',question:"Un robot aspirateur qui apprend la disposition est un exemple de :",options:["IA faible","IA forte","Variable statique","Séquence simple"],correct:1,explanation:"L'IA forte permet d'apprendre et de modifier son programme."},{type:'fill',question:"Le programme du système embarqué est stocké dans la ________ d'un ordinateur embarqué.",answer:'mémoire',explanation:"Le programme est stocké dans la mémoire d'un ordinateur embarqué."}]},{id:'signal',num:'Fiche 8',title:'Forme & transmission du signal',ref:'Source : IP-2-3-C5',color:'#f59e0b',exercises:[{type:'qcm',question:"Quelles sont les 4 formes de signal ?",options:["Bluetooth, WiFi, 4G, 5G","Électrique, lumineux, sonore, radio","Capteur, actionneur, interface, programme","Cuivre, fibre, USB, câble réseau"],correct:1,explanation:"4 formes : électrique, lumineux, sonore ou radio."},{type:'matching',question:"Associe chaque moyen de transmission à sa catégorie :",left:["Fibre optique","Bluetooth","Câble USB","Ondes infrarouges"],right:["Par fil → signal lumineux","Sans fil → ondes électromagnétiques","Par fil → signal électrique","Sans fil → rayonnement infrarouge"],correctPairs:[[0,0],[1,1],[2,2],[3,3]],explanation:"Fibre optique : fil, lumineux. Bluetooth : sans fil, électromagnétique. USB : fil, électrique. Infrarouges : sans fil."},{type:'qcm',question:"Entre clé WiFi et carte WiFi, le signal est transmis par :",options:["Fil de cuivre","Câble USB","Ondes électromagnétiques (sans fil)","Fibre optique"],correct:2,explanation:"Signal radio transmis par ondes électromagnétiques (sans fil)."},{type:'qcm',question:"Dans un câble USB, la forme du signal est :",options:["Signal radio","Signal lumineux","Signal sonore","Signal électrique"],correct:3,explanation:"Impulsions électriques : signal électrique transmis par câble."},{type:'fill',question:"Pour identifier un signal, on repère l'________, le récepteur et les composants.",answer:'émetteur',explanation:"On repère l'émetteur, le récepteur et les composants utilisés."}]}];

let totalExercises=0,answeredExercises=0,correctCount=0,wrongCount=0;
const sectionCompletion={},matchState={};
SECTIONS.forEach(s=>{totalExercises+=s.exercises.length;sectionCompletion[s.id]={total:s.exercises.length,done:0}});

function buildNav(){const nav=document.getElementById('nav-tabs');SECTIONS.forEach((s,i)=>{const btn=document.createElement('button');btn.className='nav-tab'+(i===0?' active':'');btn.dataset.section=s.id;btn.innerHTML=`<span class="tab-num">${s.num}</span>${s.title}<span class="tab-check" id="check-${s.id}" style="display:none">✓</span>`;btn.onclick=()=>switchSection(s.id);nav.appendChild(btn)})}

function buildSections(){const c=document.getElementById('sections-container');SECTIONS.forEach((s,si)=>{const sec=document.createElement('section');sec.className='section'+(si===0?' active':'');sec.id=`section-${s.id}`;sec.innerHTML=buildSectionHTML(s);c.appendChild(sec)})}

function buildSectionHTML(s){let h=`<div class="section-header"><h2 style="color:${s.color}">${s.title}</h2><div class="fiche-ref">${s.ref}</div></div>`;s.exercises.forEach((ex,ei)=>{const eid=`${s.id}-${ei}`;h+=`<div class="exercise" id="ex-${eid}"><div class="exercise-num">Exercice ${ei+1}</div><div class="exercise-question">${ex.question}</div>`;if(ex.type==='qcm')h+=buildQCM(ex,eid);else if(ex.type==='fill')h+=buildFill(ex,eid);else if(ex.type==='ordering')h+=buildOrdering(ex,eid);else if(ex.type==='matching')h+=buildMatching(ex,eid);h+=`<div class="feedback" id="fb-${eid}"></div></div>`});h+=`<div class="reset-section"><button class="reset-btn" onclick="resetSection('${s.id}')">🔄 Recommencer cette fiche</button></div>`;return h}

function buildQCM(ex,eid){const L=['A','B','C','D'];let h='<div class="options">';ex.options.forEach((o,i)=>{h+=`<button class="option-btn" id="opt-${eid}-${i}" onclick="answerQCM('${eid}',${i},${ex.correct})"><span class="opt-letter">${L[i]}</span><span>${o}</span></button>`});return h+'</div>'}

function buildFill(ex,eid){const a=ex.answer.replace(/'/g,"\\'");return`<div class="fill-group"><input type="text" class="fill-input" id="input-${eid}" placeholder="Ta réponse…" onkeydown="if(event.key==='Enter')answerFill('${eid}','${a}')"><button class="validate-btn" onclick="answerFill('${eid}','${a}')">Valider</button></div>`}

function buildOrdering(ex,eid){const idx=ex.items.map((_,i)=>i);shuffleArray(idx);let h=`<div class="ordering-zone" id="order-${eid}">`;idx.forEach((o,p)=>{h+=`<div class="drag-item" draggable="true" data-orig="${o}" id="drag-${eid}-${p}" ondragstart="dragStart(event)" ondragover="dragOver(event)" ondrop="drop(event,'${eid}')"><span class="drag-handle">⠿</span><span class="drag-num">${p+1}</span><span>${ex.items[o]}</span></div>`});h+='</div>';h+=`<button class="validate-btn" onclick="answerOrdering('${eid}')">Valider l'ordre</button>`;return h}

function buildMatching(ex,eid){const ro=ex.right.map((_,i)=>i);shuffleArray(ro);matchState[eid]={left:null,right:null,pairs:[],pairCount:0,total:ex.left.length,rightOrder:ro};
let h=`<div class="match-wrapper"><div class="match-headers"><div class="match-col-header">À associer</div><div></div><div class="match-col-header">Réponses</div></div><div class="match-rows">`;
const maxRows=Math.max(ex.left.length,ex.right.length);
for(let r=0;r<maxRows;r++){h+=`<div class="match-row">`;
if(r<ex.left.length)h+=`<div class="match-item match-left-item" data-idx="${r}" id="ml-${eid}-${r}" onclick="matchClick('${eid}','left',${r})">${ex.left[r]}</div>`;else h+=`<div></div>`;
h+=`<div class="match-center">↔</div>`;
if(r<ro.length){const ri=ro[r];h+=`<div class="match-item match-right-item" data-idx="${ri}" id="mr-${eid}-${ri}" onclick="matchClick('${eid}','right',${ri})">${ex.right[ri]}</div>`}else h+=`<div></div>`;
h+=`</div>`}
h+=`</div></div>`;
h+=`<div class="match-legend" id="legend-${eid}"></div>`;
h+=`<button class="match-undo-btn" id="undo-${eid}" onclick="undoMatch('${eid}')" style="display:none">↩ Annuler la dernière</button>`;
h+=`<button class="validate-btn" id="matchbtn-${eid}" onclick="answerMatching('${eid}')" disabled>Valider les associations</button>`;
return h}

// ══ QCM ══
function answerQCM(eid,chosen,correct){const el=document.getElementById(`ex-${eid}`);if(el.dataset.done)return;el.dataset.done='1';const s=eid.split('-')[0],i=+eid.split('-')[1],ex=SECTIONS.find(x=>x.id===s).exercises[i];ex.options.forEach((_,j)=>document.getElementById(`opt-${eid}-${j}`).classList.add('disabled'));const cb=document.getElementById(`opt-${eid}-${chosen}`),co=document.getElementById(`opt-${eid}-${correct}`);if(chosen===correct){cb.classList.add('correct');el.classList.add('answered-correct');showFB(eid,1,ex.explanation);correctCount++}else{cb.classList.add('wrong');co.classList.add('correct');el.classList.add('answered-wrong');showFB(eid,0,ex.explanation);wrongCount++}answeredExercises++;updateScore(s)}

// ══ FILL ══
function answerFill(eid,answer){const el=document.getElementById(`ex-${eid}`);if(el.dataset.done)return;el.dataset.done='1';const inp=document.getElementById(`input-${eid}`),n=v=>v.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');const s=eid.split('-')[0],i=+eid.split('-')[1],ex=SECTIONS.find(x=>x.id===s).exercises[i];if(n(inp.value)===n(answer)){inp.classList.add('correct');el.classList.add('answered-correct');showFB(eid,1,ex.explanation);correctCount++}else{inp.classList.add('wrong');el.classList.add('answered-wrong');showFB(eid,0,`La bonne réponse était : <b>${answer}</b>. ${ex.explanation}`);wrongCount++}inp.disabled=true;answeredExercises++;updateScore(s)}

// ══ ORDERING ══
let draggedEl=null;
function dragStart(e){draggedEl=e.target.closest('.drag-item');e.dataTransfer.effectAllowed='move';setTimeout(()=>draggedEl.style.opacity='.4',0)}
function dragOver(e){e.preventDefault()}
function drop(e,eid){e.preventDefault();const t=e.target.closest('.drag-item');if(!t||t===draggedEl){if(draggedEl)draggedEl.style.opacity='1';return}const z=document.getElementById(`order-${eid}`),items=[...z.children],fi=items.indexOf(draggedEl),ti=items.indexOf(t);if(fi<ti)z.insertBefore(draggedEl,t.nextSibling);else z.insertBefore(draggedEl,t);draggedEl.style.opacity='1';[...z.children].forEach((el,i)=>el.querySelector('.drag-num').textContent=i+1)}
function answerOrdering(eid){const el=document.getElementById(`ex-${eid}`);if(el.dataset.done)return;el.dataset.done='1';const z=document.getElementById(`order-${eid}`),items=[...z.children],s=eid.split('-')[0],i=+eid.split('-')[1],ex=SECTIONS.find(x=>x.id===s).exercises[i];let ok=true;items.forEach((e,j)=>{const o=+e.dataset.orig;if(o===ex.correctOrder[j])e.classList.add('correct-pos');else{e.classList.add('wrong-pos');ok=false}e.draggable=false;e.style.cursor='default'});if(ok){el.classList.add('answered-correct');showFB(eid,1,ex.explanation);correctCount++}else{el.classList.add('answered-wrong');showFB(eid,0,ex.explanation);wrongCount++}answeredExercises++;updateScore(s)}

// ══ MATCHING ══
function matchClick(eid,side,idx){const st=matchState[eid];if(!st)return;const el=document.getElementById(`m${side[0]}-${eid}-${idx}`);if(el.classList.contains('matched')||el.classList.contains('locked'))return;if(st[side]!==null){document.getElementById(`m${side[0]}-${eid}-${st[side]}`).classList.remove('selected');if(st[side]===idx){st[side]=null;return}}st[side]=idx;el.classList.add('selected');if(st.left!==null&&st.right!==null){const pi=st.pairCount,pc=`pair-${pi}`,color=PAIR_COLORS[pi%PAIR_COLORS.length];const le=document.getElementById(`ml-${eid}-${st.left}`),re=document.getElementById(`mr-${eid}-${st.right}`);le.classList.remove('selected');le.classList.add('matched',pc);re.classList.remove('selected');re.classList.add('matched',pc);st.pairs.push([st.left,st.right]);st.pairCount++;const sec=eid.split('-')[0],ei=+eid.split('-')[1],ex=SECTIONS.find(x=>x.id===sec).exercises[ei];const lg=document.getElementById(`legend-${eid}`),it=document.createElement('div');it.className='match-legend-item';it.innerHTML=`<span class="match-legend-dot" style="background:${color}"></span>${ex.left[st.left]} ↔ ${ex.right[st.right]}`;lg.appendChild(it);document.getElementById(`undo-${eid}`).style.display='inline-block';st.left=null;st.right=null;if(st.pairCount>=st.total)document.getElementById(`matchbtn-${eid}`).disabled=false}}

function undoMatch(eid){const st=matchState[eid];if(!st||st.pairCount===0)return;const lp=st.pairs.pop();st.pairCount--;const pc=`pair-${st.pairCount}`;document.getElementById(`ml-${eid}-${lp[0]}`).classList.remove('matched',pc);document.getElementById(`mr-${eid}-${lp[1]}`).classList.remove('matched',pc);const lg=document.getElementById(`legend-${eid}`);if(lg.lastChild)lg.removeChild(lg.lastChild);if(st.pairCount===0)document.getElementById(`undo-${eid}`).style.display='none';document.getElementById(`matchbtn-${eid}`).disabled=true}

function answerMatching(eid){const el=document.getElementById(`ex-${eid}`);if(el.dataset.done)return;el.dataset.done='1';const st=matchState[eid],sec=eid.split('-')[0],ei=+eid.split('-')[1],ex=SECTIONS.find(x=>x.id===sec).exercises[ei];let ok=true;st.pairs.forEach(([l,r])=>{const c=ex.correctPairs.find(p=>p[0]===l);if(!c||c[1]!==r)ok=false});document.querySelectorAll(`[id^="ml-${eid}-"],[id^="mr-${eid}-"]`).forEach(e=>e.classList.add('locked'));document.getElementById(`undo-${eid}`).style.display='none';if(ok){el.classList.add('answered-correct');showFB(eid,1,ex.explanation);correctCount++}else{el.classList.add('answered-wrong');showFB(eid,0,ex.explanation);wrongCount++}answeredExercises++;updateScore(sec)}

// ══ HELPERS ══
function showFB(eid,ok,txt){const fb=document.getElementById(`fb-${eid}`);fb.className='feedback show '+(ok?'correct':'wrong');fb.innerHTML=(ok?'✅ Correct ! ':'❌ Incorrect. ')+txt}
function updateScore(sid){document.getElementById('score-correct').textContent=correctCount;document.getElementById('score-wrong').textContent=wrongCount;const p=totalExercises>0?Math.round(answeredExercises/totalExercises*100):0;document.getElementById('score-pct').textContent=p+'%';document.getElementById('progress-fill').style.width=p+'%';sectionCompletion[sid].done++;if(sectionCompletion[sid].done>=sectionCompletion[sid].total){const c=document.getElementById(`check-${sid}`);if(c)c.style.display='inline'}}
function updateScoreDisplay(){document.getElementById('score-correct').textContent=correctCount;document.getElementById('score-wrong').textContent=wrongCount;const p=totalExercises>0?Math.round(answeredExercises/totalExercises*100):0;document.getElementById('score-pct').textContent=p+'%';document.getElementById('progress-fill').style.width=p+'%'}
function switchSection(id){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));document.getElementById(`section-${id}`).classList.add('active');document.querySelector(`[data-section="${id}"]`).classList.add('active');window.scrollTo({top:0,behavior:'smooth'})}
function resetSection(sid){const sec=SECTIONS.find(s=>s.id===sid),sel=document.getElementById(`section-${sid}`);sel.querySelectorAll('.exercise').forEach(e=>{if(e.dataset.done){if(e.classList.contains('answered-correct')){correctCount--;answeredExercises--}else if(e.classList.contains('answered-wrong')){wrongCount--;answeredExercises--}}});sectionCompletion[sid].done=0;const ck=document.getElementById(`check-${sid}`);if(ck)ck.style.display='none';sec.exercises.forEach((ex,ei)=>{delete matchState[`${sid}-${ei}`]});const ns=document.createElement('section');ns.className='section active';ns.id=`section-${sid}`;ns.innerHTML=buildSectionHTML(sec);sel.replaceWith(ns);updateScoreDisplay();window.scrollTo({top:0,behavior:'smooth'})}
function shuffleArray(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}

buildNav();buildSections();
</script>
</body>
</html>
